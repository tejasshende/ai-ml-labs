<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-card">
        <h1>Reset Password</h1>

        <!-- Flash messages for errors / success -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="form-group">
                <label for="token">Reset Token</label>
                <input type="text" id="token" name="token" placeholder="Enter your 6-digit token" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
            </div>
            <button type="submit" id="reset-password-button">Reset Password</button>
        </form>

        <div class="forgot-link">
            <a href="{{ url_for('login') }}" id="back-to-login-link">← Back to Login</a>
        </div>
    </div>
</body>
</html>
